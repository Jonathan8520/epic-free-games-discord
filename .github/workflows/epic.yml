name: Epic Free Games Bot

on:
  schedule:
    - cron: "0 * * * *"  # Toutes les heures (le scheduler Python filtre)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get state.json from datas branch
        run: git checkout origin/datas -- state.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          DISCORD_WEBHOOK   : ${{ secrets.DISCORD_WEBHOOK }}
          ALERT_WEBHOOK     : ${{ secrets.ALERT_WEBHOOK }}
          ROLE_ID           : ${{ secrets.ROLE_ID }}
          GITHUB_REPOSITORY : ${{ github.repository }}
          AUTO_CLAIM        : ${{ vars.AUTO_CLAIM }}
          EPIC_REFRESH_TOKEN: ${{ secrets.EPIC_REFRESH_TOKEN }}
          GH_PAT            : ${{ secrets.GH_PAT }}
        run: python main.py

      - name: Push state.json to datas branch
        run: |
          cp state.json /tmp/state.json
          git checkout datas
          cp /tmp/state.json state.json
          git add state.json
          git diff --cached --quiet && exit 0
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update state.json"
          git push origin datas
